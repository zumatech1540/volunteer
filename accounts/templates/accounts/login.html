{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Voluntee Platform</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>

        body {
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
                        url("{% static 'images/hero.jpg' %}");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-box {
            width: 100%;
            max-width: 450px;
            background: rgba(255,255,255,0.96);
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #198754, #0d6efd);
            padding: 25px;
            text-align: center;
            color: white;
        }

        .login-header img {
            width: 60px;
            margin-bottom: 10px;
        }

        .login-header h3 {
            margin: 0;
            font-weight: 700;
        }

        .login-header p {
            margin: 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .login-body {
            padding: 30px;
        }

        .form-control {
            height: 48px;
            border-radius: 10px;
        }

        .btn-login {
            height: 48px;
            border-radius: 10px;
            font-weight: 600;
        }

        .small-link {
            text-decoration: none;
            font-weight: 600;
        }

        .small-link:hover {
            text-decoration: underline;
        }

        .input-group-text {
            border-radius: 10px 0 0 10px;
        }

        .hint {
            font-size: 13px;
            color: #666;
            margin-top: -6px;
        }

    </style>

</head>

<body>

<div class="login-box">

    <!-- HEADER -->
    <div class="login-header">

        <img src="{% static 'projects/lgo.jpg' %}" alt="Logo">

        <h3>i support Ndiritu Platform</h3>

        <p>Sign in to continue</p>

    </div>

    <!-- BODY -->
    <div class="login-body">

        <!-- ALERTS -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- LOGIN FORM (FIXED ACTION) -->
        <form method="POST" action="{% url 'login' %}">

            {% csrf_token %}

            <!-- USERNAME / EMAIL -->
            <div class="mb-2">

                <div class="input-group">

                    <span class="input-group-text">
                        <i class="bi bi-person"></i>
                    </span>

                    <input type="text"
                           name="email"
                           class="form-control"
                           placeholder="Email or Username"
                           required>

                </div>

            </div>

            <div class="hint mb-3">
                You can use email or username to login
            </div>

            <!-- PASSWORD -->
            <div class="mb-4">

                <div class="input-group">

                    <span class="input-group-text">
                        <i class="bi bi-lock"></i>
                    </span>

                    <input type="password"
                           name="password"
                           id="password"
                           class="form-control"
                           placeholder="Password"
                           required>

                    <button type="button"
                            class="btn btn-outline-secondary"
                            onclick="togglePassword()">

                        <i class="bi bi-eye"></i>

                    </button>

                </div>

            </div>

            <!-- BUTTON -->
            <button class="btn btn-success w-100 btn-login">
                Login
            </button>

        </form>

        <!-- LINKS -->
        <div class="text-center mt-4">

            <p>
                Don't have an account?
                <a href="{% url 'register' %}" class="small-link">Register</a>
            </p>

        </div>

    </div>

</div>

<script>

    function togglePassword() {

        let p = document.getElementById("password");

        p.type = (p.type === "password") ? "text" : "password";
    }

</script>

</body>
</html>
