{% extends "accounts/base.html" %}
{% block content %}

<div class="container mt-5">

    <h3>Create Event Budget</h3>

    <div class="card p-4 shadow-sm">

        <form method="POST">

            {% csrf_token %}

            <!-- EVENT -->
            <label>Select Event</label>

            <select name="event" class="form-control mb-3" required>

                <option value="">Select Event</option>

                {% for e in events %}
                    <option value="{{ e.id }}">
                        {{ e.title }}
                    </option>
                {% endfor %}

            </select>

            <!-- TOTAL BUDGET -->
            <label>Total Budget</label>

            <input type="number"
                   step="0.01"
                   name="total_budget"
                   class="form-control mb-3"
                   required>

            <button type="submit" class="btn btn-success w-100">
                Save Budget
            </button>
          {% if error %}
<div class="alert alert-danger">
    {{ error }}
</div>
{% endif %}
        </form>

    </div>

</div>

{% endblock %}
