{% extends 'accounts/base.html' %}
{% block content %}

<div class="container my-4">

    <h3>🔔 Notifications</h3>

    {% for n in notifications %}
        <div class="card p-3 mb-2 {% if not n.is_read %}border-primary{% endif %}">

            <h5>{{ n.title }}</h5>
            <p>{{ n.message }}</p>

            <small>{{ n.created_at }}</small>

        </div>
    {% empty %}
        <p>No notifications</p>
    {% endfor %}

</div>

{% endblock %}
