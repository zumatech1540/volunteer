<!DOCTYPE html>
<html>
<head>
    <title>Register Voter</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6fb;
        }

        .card{
            border-radius:15px;
            box-shadow:0 4px 10px rgba(0,0,0,0.08);
        }

        .form-title{
            font-weight:bold;
        }

        .btn-primary{
            padding:10px 25px;
            border-radius:10px;
        }

        label{
            font-weight:500;
            margin-bottom:5px;
        }
    </style>

</head>

<body>

<div class="container mt-5">

    <!-- ================= HEADER ================= -->
    <div class="text-center mb-4">
        <h3 class="form-title">🗳 Register New Voter</h3>
        <p class="text-muted">Add voter details under your leadership</p>
    </div>

    <!-- ================= CARD ================= -->
    <div class="card p-4">

        <!-- ================= MESSAGES ================= -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="row g-3">

                <!-- FIRST NAME -->
                <div class="col-md-6">
                    <label>First Name *</label>
                    <input type="text" name="first_name" class="form-control" required>
                </div>

                <!-- LAST NAME -->
                <div class="col-md-6">
                    <label>Last Name *</label>
                    <input type="text" name="last_name" class="form-control" required>
                </div>

                <!-- PHONE -->
                <div class="col-md-6">
                    <label>Phone *</label>
                    <input type="text" name="phone" class="form-control" required>
                </div>

                <!-- GENDER -->
                <div class="col-md-6">
                    <label>Gender</label>
                    <select name="gender" class="form-select">
                        <option value="">-- Select --</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>

                <!-- WARD -->
                <div class="col-md-6">
                    <label>Ward</label>
                    <select name="ward" class="form-select">
                        {% for w in wards %}
                            <option value="{{ w.id }}">{{ w.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- POLLING STATION -->
                <div class="col-md-6">
                    <label>Polling Station</label>
                    <select name="polling_station" class="form-select">
                        {% for s in stations %}
                            <option value="{{ s.id }}">{{ s.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- SUPPORT STATUS -->
                <div class="col-md-6">
                    <label>Support Status</label>
                    <select name="support_status" class="form-select">
                        <option value="supporter">Supporter</option>
                        <option value="undecided" selected>Undecided</option>
                        <option value="opponent">Opponent</option>
                    </select>
                </div>

                <!-- NOTES -->
                <div class="col-md-12">
                    <label>Notes</label>
                    <textarea name="notes" class="form-control" rows="3"
                              placeholder="Optional remarks about this voter..."></textarea>
                </div>

                <!-- BUTTON -->
                <div class="col-md-12 text-end mt-3">
                    <button class="btn btn-primary">
                        ➕ Register Voter
                    </button>
                </div>

            </div>

        </form>

    </div>

</div>

</body>
</html>
