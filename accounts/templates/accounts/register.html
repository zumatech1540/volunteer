{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register | Volunteer Platform</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>

        body {
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
                        url("{% static 'images/hero.jpg' %}");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .auth-box {
            width: 100%;
            max-width: 700px;
            background: rgba(255,255,255,0.95);
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        /* HEADER */
        .auth-header {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            padding: 25px;
            text-align: center;
            color: white;
        }

        .auth-header img {
            width: 60px;
            margin-bottom: 10px;
        }

        .auth-header h3 {
            margin: 0;
            font-weight: 700;
        }

        .auth-header p {
            margin: 0;
            font-size: 14px;
            opacity: 0.9;
        }

        /* BODY */
        .auth-body {
            padding: 30px;
        }

        .form-control,
        .form-select {
            height: 46px;
            border-radius: 10px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #666;
            margin: 15px 0 10px;
        }

        .btn-primary {
            border-radius: 10px;
            height: 48px;
            font-weight: 600;
        }

        /* FOOTER */
        .auth-footer {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            font-size: 14px;
        }

        .auth-footer a {
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<div class="auth-box">

    <!-- HEADER -->
    <div class="auth-header">

        <img src="{% static 'images/logo.png' %}" alt="Logo">

        <h3>Volunteer Platform</h3>

        <p>Volunteer Registration System</p>

    </div>

    <!-- BODY -->
    <div class="auth-body">

        <!-- ALERTS -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="section-title">PERSONAL INFORMATION</div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <input type="text" name="first_name" class="form-control" placeholder="First Name" required>
                </div>

                <div class="col-md-6 mb-3">
                    <input type="text" name="last_name" class="form-control" placeholder="Last Name" required>
                </div>
            </div>

            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="Email Address" required>
            </div>

            <div class="mb-3">
                <input type="text" name="phone" class="form-control" placeholder="Phone Number" required>
            </div>

            <div class="section-title">LOCATION</div>

            <div class="mb-3">
                <select name="constituency" id="constituency" class="form-select" required>
                    <option value="">Select Constituency</option>
                    {% for c in constituencies %}
                        <option value="{{ c.id }}">{{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <select name="ward" id="ward" class="form-select" disabled required>
                    <option value="">Select Ward</option>
                </select>
            </div>

            <div class="mb-3">
                <select name="polling_station" id="polling" class="form-select" disabled required>
                    <option value="">Select Polling Station</option>
                </select>
            </div>

            <div class="section-title">PROFESSION</div>

            <div class="mb-3">
                <select name="profession" id="profession" class="form-select" required>
                    <option value="">Select Profession</option>
                    <option value="farmer">Farmer</option>
                    <option value="teacher">Teacher</option>
                    <option value="business">Business</option>
                    <option value="student">Student</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="mb-3">
                <input type="text" name="other_profession" id="other_profession"
                       class="form-control" placeholder="Specify Profession"
                       style="display:none;">
            </div>

            <div class="section-title">SECURITY</div>

            <div class="mb-3">
                <input type="password" name="password1" class="form-control" placeholder="Password" required>
            </div>

            <div class="mb-3">
                <input type="password" name="password2" class="form-control" placeholder="Confirm Password" required>
            </div>

            <button class="btn btn-primary w-100">
                Create Account
            </button>

        </form>

    </div>

    <!-- FOOTER -->
    <div class="auth-footer">
        Already have an account?
        <a class="btn btn-light btn-sm"
   href="http://127.0.0.1:8000/login/">
    Login
</a>
    </div>

</div>

<script>

    // PROFESSION
    $("#profession").change(function () {
        if ($(this).val() === "other") {
            $("#other_profession").slideDown();
        } else {
            $("#other_profession").slideUp().val("");
        }
    });

    // CONSTITUENCY → WARD
    $("#constituency").change(function () {

        let id = $(this).val();

        $.ajax({
            url: "{% url 'load_wards' %}",
            data: { constituency_id: id },
            success: function (data) {

                $("#ward").prop("disabled", false).html('<option>Select Ward</option>');

                data.forEach(item => {
                    $("#ward").append(`<option value="${item.id}">${item.name}</option>`);
                });

            }
        });

    });

    // WARD → POLLING
    $("#ward").change(function () {

        let id = $(this).val();

        $.ajax({
            url: "{% url 'load_polling' %}",
            data: { ward_id: id },
            success: function (data) {

                $("#polling").prop("disabled", false).html('<option>Select Polling Station</option>');

                data.forEach(item => {
                    $("#polling").append(`<option value="${item.id}">${item.name}</option>`);
                });

            }
        });

    });

</script>

</body>
</html>
